# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Docusaurus 3.10.1, React 19, TypeScript 6.0, Bun
  Architecture: Static documentation site with i18n (11 locales, default es)
  Testing: No test runner configured (strict_tdd: false)
  Style: MDX docs, Docusaurus conventions, autogenerated sidebars

rules:
  proposal:
    - Include rollback plan for risky changes
    - Scope changes by locale or doc section
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: "npx tsc --noEmit"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner: null
  reason: "No test runner detected in the project. Docusaurus docs site has only typecheck (tsc) and build verification."
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage: { available: false, command: null }
  quality:
    type_checker: { available: true, command: "npx tsc --noEmit" }
    linter: { available: false, command: null }
    formatter: { available: false, command: null }
